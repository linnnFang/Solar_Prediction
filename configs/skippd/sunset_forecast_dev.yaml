# SUNSET Forecast CNN — fast dev run (a few epochs, small batch) to prove the path.
run_name: sunset_dev
seed: 42
data: { root: data/raw/SKIPPD }
window: { history_minutes: 15, history_step_minutes: 1, horizon_minutes: 15,
          strides: { train: 8, validation: 4, test: 1 } }   # coarse strides -> fewer windows for dev
split: { strategy: chronological_day_holdout, seed: 42, val_frac: 0.15 }
scaler: { name: capacity, capacity_kw: 30.1 }
model: { name: sunset_forecast, hidden: 1024, dropout: 0.4 }
trainer: { lr: 3.0e-6, weight_decay: 0.0, grad_clip: null,
           max_epochs: 3, patience: 2, batch_size: 64, num_workers: 0 }
eval: { capacity_kw: 30.1 }
artifacts: { dir: artifacts/skippd }
